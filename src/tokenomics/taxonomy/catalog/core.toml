maturity = "curated"
provenance = "Claude Code best practices"
reviewed = "2026-06"
title = "MCP server loaded but never called"
recommendation = "Disable unused MCP servers — their tool schemas sit in every request for no benefit."

[[pattern]]
id = "claudemd.bloat"
