remediation_skill = "context-window-evaluator"
maturity = "curated"
provenance = "Claude Code best practices"
reviewed = "2026-06"
title = "Large standing context window"
recommendation = "Offload to subagents, trim CLAUDE.md, disable unused MCP, compact long sessions."

[[pattern]]
id = "context.unused-mcp"
category = "context"
polarity = "anti_pattern"
scope = "static"
engine = "detector"
detector_id = "context_window"
signals = ["unused_mcp_count"]
