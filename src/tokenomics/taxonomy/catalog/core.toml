# ── Declarative patterns (rule over the feature vector; no bespoke code) ──────

[[pattern]]
id = "routing.thinking-on-trivial"
category = "routing"
polarity = "anti_pattern"
scope = "trajectory"
engine = "declarative"
rule = "thinking_trivial_turns >= th.thinking_trivial"
signals = ["thinking_trivial_turns"]
severity = "med"
remediation_skill = "dynamic-router-advisor"
maturity = "curated"
provenance = "claude-api skill (extended thinking); fills the second_tier docstring gap"
reviewed = "2026-06"
title = "Extended thinking spent on trivial turns"
recommendation = "Lower the thinking/effort tier for routine turns; raise it only for intelligence-sensitive work."

[[pattern]]
id = "routing.premium-subagents"
category = "routing"
polarity = "best_practice"
scope = "trajectory"
engine = "declarative"
rule = "premium_subagent_runs >= th.premium_subagent_runs"
signals = ["premium_subagent_runs", "subagent_count"]
severity = "low"
remediation_skill = "dynamic-router-advisor"
maturity = "curated"
provenance = "Claude Code best practices (cheap-subagent pins)"
reviewed = "2026-06"
title = "Subagents running on a premium model"
recommendation = "Pin mechanical/search subagents to a cheap model via agent `model:` frontmatter; switching models mid-thread also preserves the main prompt cache."
