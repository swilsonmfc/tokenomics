# Core cost taxonomy — the curated knowledge source.
#
# Each [[pattern]] is one cost pattern. `engine = "detector"` records are metadata
# that cross-reference a bespoke Python detector (it stamps Finding.pattern_id).
# `engine = "declarative"` records carry a `rule` over the trajectory feature vector
# (see features.py) and are evaluated by detectors/taxonomy_match.py — new coverage
# without new code. Keep this file the single place patterns are described.

# ── Detector-backed patterns (the historical seven) ──────────────────────────

[[pattern]]
id = "search.grep-heavy"
category = "search"
polarity = "anti_pattern"
scope = "trajectory"
engine = "detector"
detector_id = "search_efficiency"
signals = ["search_ratio", "search_calls"]
remediation_skill = "code-indexing-advisor"
maturity = "curated"
provenance = "Claude Code best practices + claude-api skill"
reviewed = "2026-06"
title = "Search-heavy trajectory (raw grep over structured navigation)"
recommendation = "Add LSP/AST/RepoMap navigation; prefer symbol lookup over full-text scans."

[[pattern]]
id = "routing.premium-everywhere"
category = "routing"
polarity = "anti_pattern"
scope = "trajectory"
engine = "detector"
detector_id = "routing"
signals = ["premium_token_share", "trivial_premium_turns"]
remediation_skill = "dynamic-router-advisor"
maturity = "curated"
provenance = "Claude Code best practices + claude-api skill"
reviewed = "2026-06"
title = "Premium model for trivial work"
recommendation = "Route trivial/mechanical turns to a cheaper tier; reserve premium for hard reasoning."

[[pattern]]
id = "context.large-window"
category = "context"
polarity = "anti_pattern"
scope = "session"
engine = "detector"
detector_id = "context_window"
